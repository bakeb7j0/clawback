services:
  clawback:
    build: .
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    environment:
      - PORT=${PORT:-8080}
      # Uncomment to enable access gating:
      # - CLAWBACK_SECRET=your-secret-here
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:${PORT:-8080}/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
