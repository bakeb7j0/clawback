<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clawback — Session Replay</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <!-- Third-party libraries -->
    <script defer src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/styles/github-dark.min.css">
    <script defer src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/highlight.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/dompurify@3.2.3/dist/purify.min.js"></script>
    <!-- Clawback modules -->
    <script defer src="/static/js/parser.js"></script>
    <script defer src="/static/js/playback.js"></script>
    <script defer src="/static/js/renderer.js"></script>
    <script defer src="/static/js/scroller.js"></script>
    <script defer src="/static/js/annotations.js"></script>
    <script defer src="/static/js/app.js"></script>
    <!-- Alpine.js MUST be last — defer scripts execute in order, and Alpine
         needs clawbackApp() to be defined before it initializes -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.9/dist/cdn.min.js"></script>
</head>
<body x-data="clawbackApp()" @keydown.window="handleKeydown($event)">
    <header class="app-header">
        <button class="app-header__back"
                x-show="view === 'playback'"
                @click="backToSessions()"
                title="Back to sessions">&#8592; Sessions</button>
        <h1 class="app-title">Clawback</h1>
        <span class="app-subtitle" x-show="sessionName" x-text="sessionName"></span>
    </header>

    <main class="app-main">
        <!-- Session picker -->
        <div x-show="view === 'picker'">
            <!-- Loading sessions list -->
            <div class="picker__loading" x-show="loadingSessions">
                <div class="spinner"></div>
                <p>Loading sessions&#8230;</p>
            </div>

            <!-- Loading a specific session -->
            <div class="picker__loading" x-show="loadingSession && !loadingSessions">
                <div class="spinner"></div>
                <p>Loading session&#8230;</p>
            </div>

            <!-- Session picker content -->
            <div class="picker" x-show="!loadingSessions && !loadingSession">
                <!-- Session grid -->
                <div class="picker__grid" x-show="sessions.length > 0">
                    <template x-for="session in sessions" :key="session.id">
                        <div class="picker__card" @click="loadSession(session)">
                            <h3 class="picker__card-title" x-text="session.title"></h3>
                            <p class="picker__card-desc" x-text="session.description"></p>
                            <span class="picker__card-meta" x-text="session.beat_count + ' beats'"></span>
                        </div>
                    </template>
                </div>

                <p class="picker__empty" x-show="sessions.length === 0">
                    No curated sessions available.
                </p>

                <!-- Upload area -->
                <div class="picker__upload">
                    <h3 class="picker__upload-title">Upload your own session</h3>
                    <div class="picker__upload-zone"
                         @dragover.prevent="$el.classList.add('picker__upload-zone--active')"
                         @dragleave="$el.classList.remove('picker__upload-zone--active')"
                         @drop.prevent="$el.classList.remove('picker__upload-zone--active'); handleFileDrop($event)">
                        <p>Drop a <code>.jsonl</code> file here, or</p>
                        <label class="picker__upload-btn">
                            Browse files
                            <input type="file" accept=".jsonl" @change="handleFileUpload($event)" hidden>
                        </label>
                    </div>
                    <p class="picker__error" x-show="uploadError" x-text="uploadError"></p>
                </div>
            </div>
        </div>

        <!-- Playback view -->
        <div class="chat-area"
             x-ref="chatArea"
             x-show="view === 'playback'"
             :class="{ 'chat-area--show-meta': showBeatNumbers }">
        </div>
    </main>

    <!-- Playback toolbar -->
    <div class="toolbar" x-show="view === 'playback'" x-cloak>
        <!-- Transport controls -->
        <div class="toolbar__group">
            <button class="toolbar__btn" @click="skipToStart()" :disabled="playbackState === 'READY'" title="Skip to start">⏮</button>
            <button class="toolbar__btn" @click="previousBeat()" :disabled="currentBeat === 0" title="Previous beat">⏪</button>
            <button class="toolbar__btn toolbar__btn--play" @click="togglePlay()" title="Play/Pause"
                    x-text="playbackState === 'PLAYING' ? '⏸' : '▶'">▶</button>
            <button class="toolbar__btn" @click="nextBeat()" :disabled="playbackState === 'COMPLETE'" title="Next beat">⏩</button>
            <button class="toolbar__btn" @click="skipToEnd()" :disabled="playbackState === 'COMPLETE'" title="Skip to end">⏭</button>
        </div>

        <div class="toolbar__separator"></div>

        <!-- Speed presets -->
        <div class="toolbar__group">
            <button class="toolbar__btn toolbar__btn--speed" :class="{ 'toolbar__btn--active': speed === 0.5 }" @click="setSpeed(0.5)">0.5x</button>
            <button class="toolbar__btn toolbar__btn--speed" :class="{ 'toolbar__btn--active': speed === 1 }" @click="setSpeed(1)">1x</button>
            <button class="toolbar__btn toolbar__btn--speed" :class="{ 'toolbar__btn--active': speed === 1.5 }" @click="setSpeed(1.5)">1.5x</button>
            <button class="toolbar__btn toolbar__btn--speed" :class="{ 'toolbar__btn--active': speed === 2 }" @click="setSpeed(2)">2x</button>
        </div>

        <div class="toolbar__separator"></div>

        <!-- Inner workings toggle -->
        <div class="toolbar__group">
            <span class="toolbar__label">&#9881; Inner workings:</span>
            <button class="toolbar__btn toolbar__btn--iw" :class="{ 'toolbar__btn--active': innerWorkingsMode === 'collapsed' }" @click="setInnerWorkingsMode('collapsed')">Collapsed</button>
            <button class="toolbar__btn toolbar__btn--iw" :class="{ 'toolbar__btn--active': innerWorkingsMode === 'expanded' }" @click="setInnerWorkingsMode('expanded')">Expanded</button>
        </div>

        <div class="toolbar__separator"></div>

        <!-- Progress indicator -->
        <div class="toolbar__group">
            <span class="toolbar__progress" x-text="'Beat ' + currentBeat + ' / ' + totalBeats"></span>
        </div>
    </div>

    <!-- Scroll-pause indicator -->
    <div class="scroll-pause-indicator"
         x-show="playbackState === 'SCROLL_PAUSED'"
         x-transition
         @click="resumePlayback()">
        Playback paused &#8212; Click to resume &#9654;
    </div>

</body>
</html>
